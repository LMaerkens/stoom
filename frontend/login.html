<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stoom – Inloggen</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <div class="nav-top">
    <a href="index.html" class="nav-logo">
      <img src="css/betere-stoom.png" alt="Stoom logo" class="logo-icon" />
      <span class="logo-text">Stoom</span>
    </a>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="store.html">Store</a>
      <a href="library.html">Library</a>
      <a href="login.html" class="active">Login</a>
    </div>

    <div class="nav-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffd200" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Zoek een game…" />
    </div>

    <div class="nav-icons">
      <button class="nav-icon-btn" title="Berichten">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </button>
      <button class="nav-icon-btn" title="Winkelwagen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="nav-bottom">
    <button class="nav-refresh" id="refreshBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <a href="#">Contact</a>
    <a href="#">Support</a>
    <a href="#">Nieuws</a>
    <a href="#">Community</a>
  </div>
</nav>

<main class="section">
  <div class="auth-container">
    <div class="auth-card">
      <h1>Inloggen</h1>
      <p>Gebruik je account om in te loggen bij Stoom.</p>
      <form id="loginForm" action="#" method="post" autocomplete="on">
        <label for="email">E-mailadres</label>
        <input id="email" name="email" type="email" required placeholder="naam@voorbeeld.nl" class="auth-input" />

        <label for="password">Wachtwoord</label>
        <input id="password" name="password" type="password" required placeholder="••••••••" class="auth-input" />

        <button type="submit" class="auth-btn">Inloggen</button>
      </form>

      <div class="auth-extra">
        <a href="#">Wachtwoord vergeten?</a>
        <a href="#">Maak een account</a>
      </div>
    </div>
  </div>
</main>

<script>
  document.getElementById('refreshBtn').addEventListener('click', function () {
    this.style.transition = 'transform 0.55s ease';
    this.style.transform = 'rotate(360deg)';
    setTimeout(() => { this.style.transform = 'rotate(0deg)'; }, 600);
  });

  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    alert('Succesvol ingelogd (demo).');
  });
</script>

</body>
</html>
