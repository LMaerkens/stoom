<script>
// Load installed games from localStorage
function loadInstalledGames() {
  const installedGames = JSON.parse(localStorage.getItem('installedGames') || '[]');
  const gamesContainer = document.getElementById('installed-games');
  const noGamesMessage = document.getElementById('no-games-message');

  if (installedGames.length === 0) {
    gamesContainer.style.display = 'none';
    noGamesMessage.style.display = 'block';
    return;
  }

  gamesContainer.style.display = 'grid';
  noGamesMessage.style.display = 'none';

  gamesContainer.innerHTML = installedGames.map(game => `
    <div class="installed-game-card">
      <div class="installed-game-art ${game.artClass || 'ca-1'}">${game.icon || '🎮'}</div>
      <div class="installed-game-info">
        <div class="installed-game-name">${game.name}</div>
        <div class="installed-game-genre">${game.genre}</div>
        <div class="installed-game-status">Geïnstalleerd</div>
        <button class="btn-play" onclick="playGame('${game.name}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
          Spelen
        </button>
      </div>
    </div>
  `).join('');
}

function playGame(gameName) {
  alert(`Starting ${gameName}... (Dit is een demo - in een echte app zou hier de game starten)`);
}

// Load games when page loads
document.addEventListener('DOMContentLoaded', loadInstalledGames);
</script>
